name: Bump Formulas
on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: bump-formulas
  cancel-in-progress: false
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Detect outdated formulas
        id: set-matrix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Running brew livecheck..."
          LIVECHECK_JSON=$(brew livecheck --tap=cblecker/tap --newer-only --quiet --json | jq -c '.')
          echo "${LIVECHECK_JSON}" | jq .

          MATRIX="[]"
          while read -r entry; do
            FORMULA=$(echo "${entry}" | jq -r '.formula')
            CURRENT=$(echo "${entry}" | jq -r '.version.current')
            LATEST=$(echo "${entry}" | jq -r '.version.latest')
            FORMULA_NAME="${FORMULA##*/}"

            # Skip head-only formulas
            if ! grep -q 'tag:' "Formula/${FORMULA_NAME}.rb" 2>/dev/null; then
              echo "Skipping ${FORMULA_NAME}: head-only formula"
              continue
            fi

            # Determine tag format
            CURRENT_TAG=$(grep 'tag:' "Formula/${FORMULA_NAME}.rb" | head -1 | sed 's/.*tag:.*"\(.*\)".*/\1/')
            if [[ "${CURRENT_TAG}" == v* ]]; then
              NEW_TAG="v${LATEST}"
            else
              NEW_TAG="${LATEST}"
            fi

            BRANCH="bump/${FORMULA_NAME}-${LATEST}"

            # Check for existing open PR
            EXISTING_PR=$(gh pr list --head "${BRANCH}" --state open --json number --jq 'length')
            if [[ "${EXISTING_PR}" -gt 0 ]]; then
              echo "Skipping ${FORMULA_NAME}: PR already exists for branch ${BRANCH}"
              continue
            fi

            MATRIX=$(echo "${MATRIX}" | jq -c \
              --arg f "${FORMULA_NAME}" \
              --arg c "${CURRENT}" \
              --arg l "${LATEST}" \
              --arg t "${NEW_TAG}" \
              --arg b "${BRANCH}" \
              '. + [{"formula": $f, "current": $c, "latest": $l, "tag": $t, "branch": $b}]')
          done < <(echo "${LIVECHECK_JSON}" | jq -c '.[]')

          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Found $(echo "${MATRIX}" | jq 'length') formula(s) to bump."

  bump:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bump formula
        run: ./scripts/bump-formula.sh "${{ matrix.formula }}" "${{ matrix.tag }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ matrix.branch }}
          delete-branch: true
          title: "${{ matrix.formula }} ${{ matrix.latest }}"
          body: |
            Automated bump of '${{ matrix.formula }}' to version '${{ matrix.latest }}'.

            Previous version: '${{ matrix.current }}'
          assignees: cblecker
          commit-message: "${{ matrix.formula }} ${{ matrix.latest }}"
