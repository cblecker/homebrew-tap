name: Bump Formulas
on:
  schedule:
    - cron: "7,37 * * * *"
  repository_dispatch:
    types: [formula-update]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: bump-formulas
  cancel-in-progress: false
jobs:
  dispatch-bump:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate dispatch payload
        id: validate
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          if [ -z "${FORMULA}" ] || [ -z "${TAG}" ]; then
            echo "::error::Missing required dispatch payload fields (formula, tag)"
            exit 1
          fi
          if [[ ! "${FORMULA}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid formula name '${FORMULA}'"
            exit 1
          fi
          if [[ ! "${TAG}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([._-].*)?$ ]]; then
            echo "::error::Invalid tag format '${TAG}'"
            exit 1
          fi
          VERSION="${TAG#v}"
          {
            echo "formula=${FORMULA}"
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "branch=bump/${FORMULA}-${VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check for existing PR
        id: pr-check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ steps.validate.outputs.branch }}
        run: |
          EXISTING_PR=$(gh pr list --repo "${GH_REPO}" --head "${BRANCH}" --state open --json number --jq 'length')
          if [ "${EXISTING_PR}" -gt 0 ]; then
            echo "::notice::PR already exists for branch ${BRANCH}"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump and create PR
        if: steps.pr-check.outputs.exists != 'true'
        uses: ./.github/actions/bump-and-pr
        with:
          formula: ${{ steps.validate.outputs.formula }}
          tag: ${{ steps.validate.outputs.tag }}
          version: ${{ steps.validate.outputs.version }}
          branch: ${{ steps.validate.outputs.branch }}
          body: |
            Automated bump of '${{ steps.validate.outputs.formula }}' to version '${{ steps.validate.outputs.version }}'.

            Triggered by repository_dispatch from cblecker/claude-completion.
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          app-private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

  detect:
    if: github.event_name != 'repository_dispatch'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Detect outdated formulas
        id: set-matrix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Running brew livecheck..."
          LIVECHECK_JSON=$(brew livecheck --tap=cblecker/tap --newer-only --quiet --json | jq -c '.')
          echo "${LIVECHECK_JSON}" | jq .

          MATRIX="[]"
          while read -r entry; do
            FORMULA=$(echo "${entry}" | jq -r '.formula')
            CURRENT=$(echo "${entry}" | jq -r '.version.current')
            LATEST=$(echo "${entry}" | jq -r '.version.latest')
            FORMULA_NAME="${FORMULA##*/}"

            # Skip head-only formulas
            if ! grep -q 'tag:' "Formula/${FORMULA_NAME}.rb" 2>/dev/null; then
              echo "Skipping ${FORMULA_NAME}: head-only formula"
              continue
            fi

            # Determine tag format
            CURRENT_TAG=$(grep 'tag:' "Formula/${FORMULA_NAME}.rb" | head -1 | sed 's/.*tag:.*"\(.*\)".*/\1/')
            if [[ "${CURRENT_TAG}" == v* ]]; then
              NEW_TAG="v${LATEST}"
            else
              NEW_TAG="${LATEST}"
            fi

            BRANCH="bump/${FORMULA_NAME}-${LATEST}"

            # Check for existing open PR
            EXISTING_PR=$(gh pr list --head "${BRANCH}" --state open --json number --jq 'length')
            if [[ "${EXISTING_PR}" -gt 0 ]]; then
              echo "Skipping ${FORMULA_NAME}: PR already exists for branch ${BRANCH}"
              continue
            fi

            MATRIX=$(echo "${MATRIX}" | jq -c \
              --arg f "${FORMULA_NAME}" \
              --arg c "${CURRENT}" \
              --arg l "${LATEST}" \
              --arg t "${NEW_TAG}" \
              --arg b "${BRANCH}" \
              '. + [{"formula": $f, "current": $c, "latest": $l, "tag": $t, "branch": $b}]')
          done < <(echo "${LIVECHECK_JSON}" | jq -c '.[]')

          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Found $(echo "${MATRIX}" | jq 'length') formula(s) to bump."

  bump:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Bump and create PR
        uses: ./.github/actions/bump-and-pr
        with:
          formula: ${{ matrix.formula }}
          tag: ${{ matrix.tag }}
          version: ${{ matrix.latest }}
          branch: ${{ matrix.branch }}
          body: |
            Automated bump of '${{ matrix.formula }}' to version '${{ matrix.latest }}'.

            Previous version: '${{ matrix.current }}'
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          app-private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
